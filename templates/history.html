<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal History - XAUUSD Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#131313',
                        panel: '#201f1f',
                        border: 'rgba(77, 71, 50, 0.15)',
                        gold: '#ffd700',
                        'gold-dim': '#b8960f',
                        'buy-green': '#00e479',
                        'buy-bright': '#34ff8d',
                        'sell-red': '#bd0e2f',
                        'neutral-gray': '#6b7280',
                    },
                    fontFamily: {
                        headline: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background: #131313;
            font-family: 'Inter', sans-serif;
            color: #e5e5e5;
        }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .font-body { font-family: 'Inter', sans-serif; }

        .panel {
            background: #201f1f;
            border: 1px solid rgba(77, 71, 50, 0.15);
            border-radius: 12px;
        }

        /* Table styling */
        .signal-table th {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1a1a1a;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .signal-table th:hover {
            color: #ffd700;
        }
        .signal-table th .sort-arrow {
            opacity: 0;
            transition: opacity 0.15s;
            font-size: 11px;
            margin-left: 4px;
        }
        .signal-table th.sorted .sort-arrow {
            opacity: 1;
        }
        .signal-table tr {
            border-bottom: 1px solid rgba(77, 71, 50, 0.1);
            transition: background 0.12s;
        }
        .signal-table tbody tr:hover {
            background: rgba(255, 215, 0, 0.04);
        }

        /* Slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffd700;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffd700;
            cursor: pointer;
            border: none;
        }

        /* Date input dark styling */
        input[type="date"] {
            color-scheme: dark;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #131313; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #201f1f 25%, #2a2929 50%, #201f1f 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-[rgba(77,71,50,0.15)] bg-panel sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-gold text-3xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                <h1 class="font-headline text-xl font-bold text-gold tracking-tight">Signal History</h1>
                <span class="text-neutral-gray text-sm ml-2 hidden sm:inline">XAUUSD AI Scorer</span>
            </div>
            <nav class="flex items-center gap-1">
                <a href="/" class="px-4 py-2 rounded-lg text-sm font-medium text-neutral-gray hover:text-white hover:bg-white/5 transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">dashboard</span>
                    Dashboard
                </a>
                <a href="/history" class="px-4 py-2 rounded-lg text-sm font-medium text-gold bg-gold/10 flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">history</span>
                    History
                </a>
                <a href="/logout" class="ml-4 px-3 py-2 rounded-lg text-sm text-neutral-gray hover:text-sell-red hover:bg-sell-red/10 transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">logout</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Filter Bar -->
    <div class="border-b border-[rgba(77,71,50,0.15)] bg-[#1a1a1a] sticky top-[57px] z-40">
        <div class="max-w-[1600px] mx-auto px-6 py-3">
            <div class="flex flex-wrap items-end gap-4">
                <!-- Date From -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-neutral-gray font-medium uppercase tracking-wider">From</label>
                    <input type="date" id="filterFrom"
                        class="bg-panel border border-[rgba(77,71,50,0.3)] rounded-lg px-3 py-2 text-sm text-white focus:border-gold focus:outline-none w-[150px]">
                </div>

                <!-- Date To -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-neutral-gray font-medium uppercase tracking-wider">To</label>
                    <input type="date" id="filterTo"
                        class="bg-panel border border-[rgba(77,71,50,0.3)] rounded-lg px-3 py-2 text-sm text-white focus:border-gold focus:outline-none w-[150px]">
                </div>

                <!-- Signal Type -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-neutral-gray font-medium uppercase tracking-wider">Signal</label>
                    <select id="filterSignal"
                        class="bg-panel border border-[rgba(77,71,50,0.3)] rounded-lg px-3 py-2 text-sm text-white focus:border-gold focus:outline-none w-[130px] cursor-pointer">
                        <option value="">All</option>
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                        <option value="NO_TRADE">NO_TRADE</option>
                    </select>
                </div>

                <!-- Min Confidence -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-neutral-gray font-medium uppercase tracking-wider">
                        Min Confidence: <span id="confValue" class="text-gold">0%</span>
                    </label>
                    <input type="range" id="filterConfidence" min="0" max="100" value="0"
                        class="w-[140px] mt-1"
                        oninput="document.getElementById('confValue').textContent = this.value + '%'">
                </div>

                <!-- Symbol -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-neutral-gray font-medium uppercase tracking-wider">Symbol</label>
                    <select id="filterSymbol"
                        class="bg-panel border border-[rgba(77,71,50,0.3)] rounded-lg px-3 py-2 text-sm text-white focus:border-gold focus:outline-none w-[140px] cursor-pointer">
                        <option value="">All</option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="flex gap-2 ml-auto">
                    <button onclick="applyFilters()"
                        class="px-5 py-2 bg-gold text-black font-semibold text-sm rounded-lg hover:bg-yellow-400 transition-colors flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">filter_alt</span>
                        Apply
                    </button>
                    <button onclick="resetFilters()"
                        class="px-4 py-2 bg-neutral-gray/20 text-neutral-gray font-medium text-sm rounded-lg hover:bg-neutral-gray/30 hover:text-white transition-colors">
                        Reset
                    </button>
                    <button onclick="exportCSV()"
                        class="px-4 py-2 bg-neutral-gray/20 text-neutral-gray font-medium text-sm rounded-lg hover:bg-neutral-gray/30 hover:text-white transition-colors flex items-center gap-1"
                        title="Export CSV">
                        <span class="material-symbols-outlined text-[16px]">download</span>
                        CSV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Summary -->
    <div class="max-w-[1600px] mx-auto px-6 pt-4 pb-2">
        <div class="flex flex-wrap gap-3" id="statsBar">
            <div class="panel px-4 py-2.5 flex items-center gap-2">
                <span class="material-symbols-outlined text-gold text-[20px]">analytics</span>
                <span class="text-sm text-neutral-gray">Total:</span>
                <span class="text-sm font-semibold text-white" id="statTotal">--</span>
            </div>
            <div class="panel px-4 py-2.5 flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-buy-green inline-block"></span>
                <span class="text-sm text-neutral-gray">BUY:</span>
                <span class="text-sm font-semibold text-buy-green" id="statBuy">--</span>
            </div>
            <div class="panel px-4 py-2.5 flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-sell-red inline-block"></span>
                <span class="text-sm text-neutral-gray">SELL:</span>
                <span class="text-sm font-semibold text-sell-red" id="statSell">--</span>
            </div>
            <div class="panel px-4 py-2.5 flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-neutral-gray inline-block"></span>
                <span class="text-sm text-neutral-gray">NO_TRADE:</span>
                <span class="text-sm font-semibold text-neutral-gray" id="statNoTrade">--</span>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="max-w-[1600px] mx-auto px-6 pb-6 pt-2">
        <div class="panel overflow-hidden">
            <div class="overflow-x-auto">
                <table class="signal-table w-full text-sm">
                    <thead>
                        <tr class="text-left text-xs uppercase tracking-wider text-neutral-gray">
                            <th class="px-4 py-3" data-col="time" onclick="sortBy('time')">
                                Time <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="symbol" onclick="sortBy('symbol')">
                                Symbol <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="signal" onclick="sortBy('signal')">
                                Signal <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="confidence" onclick="sortBy('confidence')">
                                Confidence <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="score" onclick="sortBy('score')">
                                Score <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="price" onclick="sortBy('price')">
                                Price <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="rsi" onclick="sortBy('rsi')">
                                RSI <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="atr" onclick="sortBy('atr')">
                                ATR <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3" data-col="ema_trend" onclick="sortBy('ema_trend')">
                                EMA Trend <span class="sort-arrow">&#9650;</span>
                            </th>
                            <th class="px-4 py-3 min-w-[200px]">
                                Reasons
                            </th>
                        </tr>
                    </thead>
                    <tbody id="signalBody">
                        <!-- Loading skeleton -->
                        <tr><td colspan="10" class="px-4 py-8 text-center text-neutral-gray">
                            <div class="flex flex-col items-center gap-3">
                                <div class="skeleton h-4 w-64"></div>
                                <div class="skeleton h-4 w-48"></div>
                                <div class="skeleton h-4 w-56"></div>
                            </div>
                        </td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="flex items-center justify-between px-4 py-3 border-t border-[rgba(77,71,50,0.15)]">
                <span class="text-sm text-neutral-gray" id="pageInfo">Loading...</span>
                <div class="flex gap-2">
                    <button id="btnPrev" onclick="prevPage()" disabled
                        class="px-4 py-1.5 text-sm rounded-lg border border-[rgba(77,71,50,0.3)] text-neutral-gray hover:text-white hover:border-gold/40 transition-colors disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1">
                        <span class="material-symbols-outlined text-[16px]">chevron_left</span>
                        Previous
                    </button>
                    <button id="btnNext" onclick="nextPage()"
                        class="px-4 py-1.5 text-sm rounded-lg border border-[rgba(77,71,50,0.3)] text-neutral-gray hover:text-white hover:border-gold/40 transition-colors disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1">
                        Next
                        <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let currentPage = 0;
const pageSize = 50;
let currentSignals = [];
let sortColumn = null;
let sortAsc = false;
let filteredTotal = 0;

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
    loadSymbols();
    fetchSignals();
});

// ---------------------------------------------------------------------------
// Symbols dropdown
// ---------------------------------------------------------------------------
async function loadSymbols() {
    try {
        const resp = await fetch('/api/symbols');
        const symbols = await resp.json();
        const sel = document.getElementById('filterSymbol');
        symbols.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            sel.appendChild(opt);
        });
    } catch (e) {
        console.warn('Failed to load symbols:', e);
    }
}

// ---------------------------------------------------------------------------
// Fetch signals
// ---------------------------------------------------------------------------
async function fetchSignals() {
    const params = new URLSearchParams();
    params.set('limit', pageSize);
    params.set('offset', currentPage * pageSize);

    const signal = document.getElementById('filterSignal').value;
    if (signal) params.set('signal', signal);

    const from = document.getElementById('filterFrom').value;
    if (from) params.set('from', from);

    const to = document.getElementById('filterTo').value;
    if (to) params.set('to', to);

    const symbol = document.getElementById('filterSymbol').value;
    if (symbol) params.set('symbol', symbol);

    try {
        const resp = await fetch('/api/signals?' + params);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        filteredTotal = data.filtered_total || 0;
        currentSignals = data.signals || [];

        // Apply client-side confidence filter
        const minConf = parseInt(document.getElementById('filterConfidence').value) || 0;
        if (minConf > 0) {
            currentSignals = currentSignals.filter(s => (s.confidence || 0) >= minConf);
        }

        renderTable(currentSignals);
        renderStats(data);
        renderPagination();
    } catch (e) {
        console.error('Fetch error:', e);
        document.getElementById('signalBody').innerHTML =
            '<tr><td colspan="10" class="px-4 py-8 text-center text-sell-red">Failed to load signals. Check connection.</td></tr>';
    }
}

// ---------------------------------------------------------------------------
// Render table
// ---------------------------------------------------------------------------
function renderTable(signals) {
    const tbody = document.getElementById('signalBody');

    if (!signals || signals.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="px-4 py-12 text-center text-neutral-gray">No signals found matching filters.</td></tr>';
        return;
    }

    tbody.innerHTML = signals.map(s => {
        const sig = s.signal || 'NO_TRADE';
        const badgeClass = sig === 'BUY'
            ? 'bg-buy-green/15 text-buy-green border-buy-green/30'
            : sig === 'SELL'
                ? 'bg-sell-red/15 text-sell-red border-sell-red/30'
                : 'bg-neutral-gray/15 text-neutral-gray border-neutral-gray/30';

        const conf = s.confidence || 0;
        const confColor = conf >= 80 ? 'text-buy-green' : conf >= 60 ? 'text-gold' : 'text-neutral-gray';

        const trend = s.ema_trend || '--';
        const trendColor = trend === 'BULLISH' ? 'text-buy-green' : trend === 'BEARISH' ? 'text-sell-red' : 'text-neutral-gray';

        const reasons = s.reasons || '';
        const reasonsText = typeof reasons === 'string' ? reasons : (Array.isArray(reasons) ? reasons.join(' | ') : '');

        const rsi = s.rsi != null ? Number(s.rsi).toFixed(1) : '--';
        const rsiColor = s.rsi < 30 ? 'text-buy-green' : s.rsi > 70 ? 'text-sell-red' : 'text-white';

        return `<tr>
            <td class="px-4 py-2.5 text-xs text-neutral-gray whitespace-nowrap font-mono">${formatTime(s.time)}</td>
            <td class="px-4 py-2.5 text-xs font-medium">${s.symbol || 'XAUUSD.m'}</td>
            <td class="px-4 py-2.5">
                <span class="inline-block px-2.5 py-0.5 text-xs font-bold rounded border ${badgeClass}">${sig}</span>
            </td>
            <td class="px-4 py-2.5 ${confColor} font-semibold text-xs">${conf.toFixed(1)}%</td>
            <td class="px-4 py-2.5 text-gold font-semibold text-xs">${s.score || 0}/10</td>
            <td class="px-4 py-2.5 text-white font-mono text-xs">${s.price ? Number(s.price).toFixed(2) : '--'}</td>
            <td class="px-4 py-2.5 ${rsiColor} font-mono text-xs">${rsi}</td>
            <td class="px-4 py-2.5 text-white font-mono text-xs">${s.atr ? Number(s.atr).toFixed(2) : '--'}</td>
            <td class="px-4 py-2.5 ${trendColor} text-xs font-medium">${trend}</td>
            <td class="px-4 py-2.5 text-xs text-neutral-gray max-w-[300px] truncate" title="${escapeHtml(reasonsText)}">${reasonsText || '--'}</td>
        </tr>`;
    }).join('');
}

// ---------------------------------------------------------------------------
// Render stats
// ---------------------------------------------------------------------------
function renderStats(data) {
    document.getElementById('statTotal').textContent = (data.filtered_total || 0).toLocaleString();
    document.getElementById('statBuy').textContent = (data.filtered_buys || 0).toLocaleString();
    document.getElementById('statSell').textContent = (data.filtered_sells || 0).toLocaleString();
    document.getElementById('statNoTrade').textContent = (data.filtered_notrade || 0).toLocaleString();
}

// ---------------------------------------------------------------------------
// Pagination
// ---------------------------------------------------------------------------
function renderPagination() {
    const start = currentPage * pageSize + 1;
    const end = Math.min(start + currentSignals.length - 1, filteredTotal);
    const total = filteredTotal;

    document.getElementById('pageInfo').textContent =
        total > 0 ? `Showing ${start}-${end} of ${total.toLocaleString()}` : 'No results';

    document.getElementById('btnPrev').disabled = currentPage === 0;
    document.getElementById('btnNext').disabled = end >= total;
}

function nextPage() {
    currentPage++;
    fetchSignals();
}

function prevPage() {
    if (currentPage > 0) {
        currentPage--;
        fetchSignals();
    }
}

// ---------------------------------------------------------------------------
// Filters
// ---------------------------------------------------------------------------
function applyFilters() {
    currentPage = 0;
    fetchSignals();
}

function resetFilters() {
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value = '';
    document.getElementById('filterSignal').value = '';
    document.getElementById('filterConfidence').value = 0;
    document.getElementById('confValue').textContent = '0%';
    document.getElementById('filterSymbol').value = '';
    currentPage = 0;
    fetchSignals();
}

// ---------------------------------------------------------------------------
// Sorting (client-side on current page)
// ---------------------------------------------------------------------------
function sortBy(col) {
    // Toggle direction
    if (sortColumn === col) {
        sortAsc = !sortAsc;
    } else {
        sortColumn = col;
        sortAsc = true;
    }

    // Update header UI
    document.querySelectorAll('.signal-table th').forEach(th => {
        th.classList.remove('sorted');
        const arrow = th.querySelector('.sort-arrow');
        if (arrow) arrow.innerHTML = '&#9650;';
    });
    const activeHeader = document.querySelector(`th[data-col="${col}"]`);
    if (activeHeader) {
        activeHeader.classList.add('sorted');
        const arrow = activeHeader.querySelector('.sort-arrow');
        if (arrow) arrow.innerHTML = sortAsc ? '&#9650;' : '&#9660;';
    }

    // Sort data
    currentSignals.sort((a, b) => {
        let va = a[col], vb = b[col];
        if (va == null) va = '';
        if (vb == null) vb = '';
        if (typeof va === 'number' && typeof vb === 'number') {
            return sortAsc ? va - vb : vb - va;
        }
        va = String(va);
        vb = String(vb);
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    renderTable(currentSignals);
}

// ---------------------------------------------------------------------------
// Export
// ---------------------------------------------------------------------------
function exportCSV() {
    window.location.href = '/api/export';
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function formatTime(t) {
    if (!t) return '--';
    // Already formatted as "YYYY-MM-DD HH:MM:SS"
    return t;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Keyboard shortcut: Enter to apply filters
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (tag === 'input' || tag === 'select') {
            applyFilters();
        }
    }
});
</script>

</body>
</html>
